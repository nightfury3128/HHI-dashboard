<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Help & Support — HHI</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app" id="app"></div>
  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/shell.js"></script>
  <script>
    (async function () {
      const manifest = await HHIData.loadManifest();
      const boardId = await HHIData.resolveBoardId();
      const data = await HHIData.loadBoard(boardId);
      const boardLabel = HHIData.boardLabel(data);
      const shell = renderShell('help', {
        location: boardLabel,
        boardId,
        boards: HHIData.boardOptions(manifest),
      });
      document.getElementById('app').innerHTML = `
        ${shell.sidebar}
        <div class="main">
          ${shell.topbar}
          <div class="content">
            <div class="page-head">
              <div>
                <div class="crumbs">Dashboard &gt; <span>Help & Support</span></div>
                <h1>Help & Support</h1>
                <p class="sub">All MHADA board working sheets are available via the board switcher. ${boardLabel} is selected.</p>
              </div>
              <div class="actions">
                <a class="btn btn-primary" href="dashboard.html?board=${boardId}">Open Dashboard</a>
              </div>
            </div>
            <div class="card placeholder-page">
              <div>
                <h2>Help & Support</h2>
                <p>Use the board selector in the top bar to switch between Amravati, CSN, Kokan, Mumbai, Nagpur, Nashik, and Pune.</p>
                <p style="margin-top:12px"><a class="btn btn-outline" href="dashboard.html?board=${boardId}">← Back to Analytics</a></p>
              </div>
            </div>
          </div>
        </div>
      `;
      bindBoardSwitcher(boardId);
    })();
  </script>
</body>
</html>
